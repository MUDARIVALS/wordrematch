<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무다의 끝말잇기 대결 사이트🔥_베타</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jua&display=swap">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --my-color: #10b981;
            --opp-color: #ef4444;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Jua', sans-serif; 
            letter-spacing: 1px;
        }
        
        body { background: var(--bg-dark); color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .game-container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: 24px; padding: 30px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); border: 1px solid #334155; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 2.3rem; background: linear-gradient(to right, #6366f1, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; line-height: 1.3; }
        
        /* 대기실 / 연결 화면 */
        .setup-box { background: #0f172a; padding: 20px; border-radius: 16px; margin-bottom: 20px; text-align: center; border: 1px solid #334155; }
        .peer-id-display { font-size: 1.2rem; color: #6366f1; font-weight: bold; margin: 10px 0; cursor: pointer; background: #1e293b; padding: 10px; border-radius: 8px; display: inline-block; }
        
        /* 점수판 및 목숨 */
        .scoreboard { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 25px; display: none; }
        .player-card { flex: 1; padding: 15px; border-radius: 16px; background: #0f172a; border: 2px solid transparent; text-align: center; transition: all 0.3s ease; }
        .player-card.active { border-color: var(--curr-color); box-shadow: 0 0 15px var(--curr-color); transform: scale(1.03); }
        .my-title { color: var(--my-color); font-size: 1.2rem; }
        .opp-title { color: var(--opp-color); font-size: 1.2rem; }
        .score { font-size: 2rem; font-weight: 800; margin-top: 5px; }
        .lives { font-size: 1.4rem; color: #f43f5e; margin-top: 5px; letter-spacing: 4px; }
        
        /* 타이머 바 */
        .timer-container { width: 100%; height: 12px; background: #334155; border-radius: 6px; margin-bottom: 25px; overflow: hidden; display: none;}
        .timer-bar { height: 100%; width: 100%; background: #10b981; transition: width 0.1s linear; }

        /* 단어 표시창 */
        .word-display { background: #0f172a; border-radius: 16px; padding: 30px; text-align: center; margin-bottom: 25px; min-height: 140px; display: none; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #1e293b; }
        .current-word { font-size: 3rem; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .word-meaning { font-size: 1rem; color: #94a3b8; margin-top: 12px; line-height: 1.4; }
        
        /* 입력창 */
        .input-group { display: none; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; background: #0f172a; border: 2px solid #334155; border-radius: 12px; padding: 15px 20px; color: white; font-size: 1.4rem; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 0 25px; font-size: 1.3rem; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #475569; cursor: not-allowed; }

        .system-msg { text-align: center; color: #f43f5e; font-size: 1.1rem; min-height: 26px; margin-bottom: 15px; }
        .history { max-height: 130px; overflow-y: auto; background: #0f172a; padding: 15px; border-radius: 12px; font-size: 1rem; color: #94a3b8; display: none; border: 1px solid #1e293b; }
        .history-item { margin-bottom: 6px; display: flex; justify-content: space-between; }

        /* 결과 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 24px; text-align: center; max-width: 400px; width: 90%; border: 2px solid #334155; }
        .modal h2 { font-size: 2.5rem; margin-bottom: 15px; color: #f59e0b; }
        .modal p { font-size: 1.2rem; margin-bottom: 25px; color: #cbd5e1; }
        .restart-btn { width: 100%; padding: 15px; background: var(--primary); border-radius: 12px; border: none; color: white; font-size: 1.3rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1>무다의 끝말잇기 대결 사이트🔥_베타</h1>
            <p id="status-text" style="color: #6366f1; font-size: 1rem; margin-top: 5px;">네트워크 연결 준비 중...</p>
        </div>

        <div class="setup-box" id="setup-box">
            <p style="color: #94a3b8; margin-bottom: 10px;">상대방에게 내 코드를 공유하거나, 상대방 코드를 입력하세요.</p>
            <div class="peer-id-display" id="my-id-display" onclick="copyMyId()">코드 생성 중...</div>
            <div style="margin: 10px 0; color:#64748b;">OR</div>
            <div style="display: flex; gap: 8px; justify-content: center;">
                <input type="text" id="peer-id-input" placeholder="상대방 코드 4자리" style="padding: 10px; font-size: 1.1rem; max-width: 200px; text-align: center;">
                <button onclick="connectToPeer()" style="padding: 0 20px; font-size:1.1rem;">대결 신청</button>
            </div>
        </div>

        <div class="scoreboard" id="scoreboard">
            <div class="player-card" id="my-card" style="--curr-color: var(--my-color);">
                <div class="my-title">나 (YOU)</div>
                <div class="score" id="my-score">0</div>
                <div class="lives" id="my-lives">❤️❤️</div>
            </div>
            <div class="player-card" id="opp-card" style="--curr-color: var(--opp-color);">
                <div class="opp-title">상대방 (OPP)</div>
                <div class="score" id="opp-score">0</div>
                <div class="lives" id="opp-lives">❤️❤️</div>
            </div>
        </div>

        <div class="timer-container" id="timer-container"><div class="timer-bar" id="timer-bar"></div></div>

        <div class="word-display" id="word-display">
            <div class="current-word" id="current-word">-</div>
            <div class="word-meaning" id="word-meaning">상대방과 동기화하는 중입니다...</div>
        </div>

        <div class="system-msg" id="system-msg"></div>

        <div class="input-group" id="input-group">
            <input type="text" id="word-input" placeholder="단어 입력 후 Enter" autocomplete="off" disabled>
            <button id="submit-btn" disabled>제출</button>
        </div>

        <div class="history" id="history-box"></div>
    </div>

    <div class="modal" id="game-over-modal">
        <div class="modal-content">
            <h2 id="winner-title">결과</h2>
            <p id="game-over-reason"></p>
            <button class="restart-btn" onclick="location.reload()">새 게임 찾기</button>
        </div>
    </div>

    <script>
        let peer = null;
        let conn = null;
        let amIHost = false; 
        let isMyTurn = false;
        
        let currentWord = '';
        let usedWords = new Set();
        let myScore = 0;
        let oppScore = 0;
        let myLives = 2;
        let oppLives = 2;

        let timer = null;
        let timeLeft = 15;
        const MAX_TIME = 15;

        const startWords = ['국어', '세계', '노트', '컴퓨터', '하늘', '과자', '인간', '사랑', '지구', '태양', '학교', '수박', '사막', '바다', '나무'];
        const forbiddenJong = [10, 11, 12, 13, 14, 15, 18, 20]; 

        function initNetwork() {
            const shortId = Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(`mudaword-${shortId}`);

            peer.on('open', (id) => {
                const displayId = id.replace('mudaword-', '');
                document.getElementById('my-id-display').innerText = `내 방 코드: ${displayId} (클릭 시 복사)`;
                document.getElementById('status-text').innerText = '상대방의 연결을 기다리는 중...';
            });

            peer.on('connection', (connection) => {
                if (conn) return;
                conn = connection;
                amIHost = true;
                setupConnection();
            });

            peer.on('error', (err) => {
                console.error(err);
                alert('네트워크 연결 오류가 발생했습니다. 새로고침합니다.');
                location.reload();
            });
        }

        function connectToPeer() {
            const inputId = document.getElementById('peer-id-input').value.trim();
            if(!inputId) return alert('코드를 입력하세요.');
            
            document.getElementById('status-text').innerText = '상대방 방에 입장 중...';
            conn = peer.connect(`mudaword-${inputId}`);
            amIHost = false;
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('status-text').innerText = '네트워크 연결 성공! 데이터 동기화 중...';
                
                document.getElementById('setup-box').style.display = 'none';
                document.getElementById('scoreboard').style.display = 'flex';
                document.getElementById('timer-container').style.display = 'block';
                document.getElementById('word-display').style.display = 'flex';
                document.getElementById('input-group').style.display = 'flex';
                document.getElementById('history-box').style.display = 'block';

                if (!amIHost) {
                    sendData({ type: 'READY' });
                }
            });

            conn.on('data', (data) => {
                handleRemoteData(data);
            });

            conn.on('close', () => {
                alert('상대방이 대결에서 이탈했습니다.');
                location.reload();
            });
        }

        function sendData(obj) {
            if (conn && conn.open) conn.send(obj);
        }

        function copyMyId() {
            const text = document.getElementById('my-id-display').innerText.split(': ')[1].split(' ')[0];
            navigator.clipboard.writeText(text);
            alert('코드가 복사되었습니다! 상대방에게 알려주세요: ' + text);
        }

        function handleRemoteData(data) {
            switch(data.type) {
                case 'READY':
                    if (amIHost) {
                        isMyTurn = true;
                        currentWord = startWords[Math.floor(Math.random() * startWords.length)];
                        usedWords.add(currentWord);
                        
                        sendData({
                            type: 'START',
                            word: currentWord,
                            used: Array.from(usedWords)
                        });
                        startGame();
                    }
                    break;
                case 'START':
                    currentWord = data.word;
                    usedWords = new Set(data.used);
                    isMyTurn = false;
                    startGame();
                    break;
                case 'TURN_PASS':
                    currentWord = data.word;
                    usedWords.add(data.word);
                    oppScore = data.oppScore;
                    document.getElementById('opp-score').innerText = oppScore;
                    addHistory('opp', data.word);
                    
                    document.getElementById('current-word').innerText = currentWord;
                    document.getElementById('word-meaning').innerText = data.meaning;
                    
                    isMyTurn = true;
                    setTurnUI();
                    break;
                case 'WRONG_ANSWER':
                    oppLives = data.oppLives;
                    updateLivesUI();
                    showSystemMsg(`상대방의 오답으로 기회가 넘어왔습니다!`);
                    
                    if (oppLives <= 0) {
                        endGame('WIN', '상대방의 목숨이 모두 소진되었습니다!');
                    } else {
                        isMyTurn = true;
                        setTurnUI();
                    }
                    break;
                case 'GAME_OVER':
                    endGame(data.winner === 'YOU' ? 'LOSE' : 'WIN', data.reason);
                    break;
            }
        }

        function getInitialChar(char) {
            const charCode = char.charCodeAt(0) - 44032;
            if (charCode < 0 || charCode > 11171) return char;
            const cho = Math.floor(charCode / 588);
            const jung = Math.floor((charCode % 588) / 28);
            const jong = charCode % 28;

            if (cho === 5 && [2, 4, 6, 8, 13, 20].includes(jung)) return String.fromCharCode(44032 + (11 * 588) + (jung * 28) + jong);
            if (cho === 5 && [0, 1, 7, 11, 12, 18].includes(jung)) return String.fromCharCode(44032 + (2 * 588) + (jung * 28) + jong);
            if (cho === 2 && [4, 6, 8, 13, 20].includes(jung)) return String.fromCharCode(44032 + (11 * 588) + (jung * 28) + jong);
            return char;
        }

        // [핵심 패치 영역] 단어 검증 완벽 차단 시스템 적용
        async function checkValidDictionary(word) {
            // 1. 글자 수 1차 방어 (문장 입력 차단)
            if (word.length < 2 || word.length > 8) return { valid: false, msg: "단어는 2~8글자 사이여야 합니다." };
            if (!/^[가-힣]+$/.test(word)) return { valid: false, msg: "올바른 한글 단어가 아닙니다." };
            
            // 2. 반복 꼼수 방어 (예: 자름자름, 바다바다)
            const halfLen = Math.floor(word.length / 2);
            if (word.length % 2 === 0 && word.substring(0, halfLen) === word.substring(halfLen)) {
                return { valid: false, msg: "동일 구절이 반복되는 꼼수 단어는 안 됩니다!" };
            }

            // 3. 자음/모음 무작위 억지 결합 방어
            for (let i = 0; i < word.length; i++) {
                const code = word.charCodeAt(i) - 44032;
                const jong = code % 28;
                if (forbiddenJong.includes(jong)) {
                    return { valid: false, msg: "표준 국어에 어긋나는 외계어입니다." };
                }
            }

            // 4. 위키낱말사전(Wiktionary) 무료 API 실시간 검증
            // (가짜 단어 '수박룸', 문장 '어라이게뭐야' 완벽 차단)
            try {
                const response = await fetch(`https://ko.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(word)}&format=json&origin=*`);
                const data = await response.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];

                // pageId가 -1이면 사전에 없는 단어
                if (pageId === "-1") {
                    return { valid: false, msg: `사전에 없는 단어입니다! (${word})` };
                }
                return { valid: true, meaning: "사전에 등록된 유효한 단어입니다." };
            } catch (error) {
                console.error("사전 API 통신 에러:", error);
                return { valid: false, msg: "사전 서버와 통신할 수 없습니다." };
            }
        }

        function startGame() {
            document.getElementById('current-word').innerText = currentWord;
            document.getElementById('word-meaning').innerText = isMyTurn ? "내 차례입니다! 단어를 입력하세요." : "상대방의 입력을 기다리고 있습니다.";
            document.getElementById('status-text').innerText = '🔥 실시간 대결 진행 중';
            updateLivesUI();
            setTurnUI();
        }

        function setTurnUI() {
            clearInterval(timer);
            const inputField = document.getElementById('word-input');
            const submitBtn = document.getElementById('submit-btn');

            if(isMyTurn) {
                inputField.disabled = false;
                submitBtn.disabled = false;
                document.getElementById('my-card').classList.add('active');
                document.getElementById('opp-card').classList.remove('active');
                document.getElementById('word-meaning').innerText = "내 차례입니다! 단어를 입력하세요.";
                inputField.focus();
                startTimer();
            } else {
                inputField.disabled = true;
                submitBtn.disabled = true;
                inputField.value = '';
                document.getElementById('opp-card').classList.add('active');
                document.getElementById('my-card').classList.remove('active');
                document.getElementById('word-meaning').innerText = "상대방의 입력을 기다리고 있습니다.";
                startTimer();
            }
        }

        function updateLivesUI() {
            document.getElementById('my-lives').innerText = '❤️'.repeat(Math.max(0, myLives)) + '💔'.repeat(Math.max(0, 2 - myLives));
            document.getElementById('opp-lives').innerText = '❤️'.repeat(Math.max(0, oppLives)) + '💔'.repeat(Math.max(0, 2 - oppLives));
        }

        function startTimer() {
            timeLeft = MAX_TIME;
            const timerBar = document.getElementById('timer-bar');
            
            timer = setInterval(() => {
                timeLeft -= 0.1;
                timerBar.style.width = `${(timeLeft / MAX_TIME) * 100}%`;

                if(timeLeft <= 0) {
                    clearInterval(timer);
                    if(isMyTurn) {
                        sendData({ type: 'GAME_OVER', winner: 'OPP', reason: '시간 초과로 패배하셨습니다!' });
                        endGame('LOSE', '시간 초과로 패배하셨습니다!');
                    }
                }
            }, 100);
        }

        function handleWrongAnswer(msg) {
            myLives--;
            updateLivesUI();
            showSystemMsg(`${msg} [목숨 -1]`);
            document.getElementById('word-input').value = '';

            if (myLives <= 0) {
                sendData({ type: 'GAME_OVER', winner: 'OPP', reason: '상대방의 목숨 소진으로 승리하셨습니다!' });
                endGame('LOSE', '목숨 소진으로 패배하셨습니다!');
            } else {
                sendData({ type: 'WRONG_ANSWER', oppLives: myLives });
                isMyTurn = false;
                setTurnUI();
            }
        }

        async function submitWord() {
            if(!isMyTurn) return;
            const inputField = document.getElementById('word-input');
            const word = inputField.value.trim();

            const lastChar = currentWord.slice(-1);
            const firstChar = word.charAt(0);
            const ruleChar = getInitialChar(lastChar);

            if (firstChar !== lastChar && firstChar !== ruleChar) {
                handleWrongAnswer(`'${lastChar}'(으)로 시작해야 합니다.`);
                return;
            }

            if (usedWords.has(word)) {
                handleWrongAnswer('이미 사용된 단어입니다.');
                return;
            }

            // 단어 검증 실행 (비동기)
            const dictCheck = await checkValidDictionary(word);
            if(!dictCheck.valid) {
                handleWrongAnswer(dictCheck.msg);
                return;
            }

            usedWords.add(word);
            myScore += word.length * 10;
            document.getElementById('my-score').innerText = myScore;
            addHistory('my', word);
            
            currentWord = word;
            document.getElementById('current-word').innerText = currentWord;
            document.getElementById('word-meaning').innerText = dictCheck.meaning;

            sendData({
                type: 'TURN_PASS',
                word: word,
                oppScore: myScore,
                meaning: dictCheck.meaning
            });

            isMyTurn = false;
            setTurnUI();
        }

        function addHistory(type, word) {
            const box = document.getElementById('history-box');
            const item = document.createElement('div');
            item.className = 'history-item';
            const color = type === 'my' ? 'var(--my-color)' : 'var(--opp-color)';
            const label = type === 'my' ? '나' : '상대';
            item.innerHTML = `<span style="color: ${color}">${label}</span> <span>${word} (+${word.length * 10})</span>`;
            box.insertBefore(item, box.firstChild);
        }

        function showSystemMsg(msg) {
            document.getElementById('system-msg').innerText = msg;
        }

        function endGame(result, reason) {
            clearInterval(timer);
            document.getElementById('winner-title').innerText = result === 'WIN' ? '🏆 대결 승리!' : '💀 패배...';
            document.getElementById('game-over-reason').innerText = reason;
            document.getElementById('game-over-modal').style.display = 'flex';
        }

        document.getElementById('word-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') submitWord();
        });
        document.getElementById('submit-btn').addEventListener('click', submitWord);

        initNetwork();
    </script>
</body>
</html>
